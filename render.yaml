# Render.com Blueprint — "New +" -> "Blueprint" -> chọn repo này là xong.
# Push lên GitHub = tự deploy (giống Vercel). Kho lưu dữ liệu: Backblaze B2.
services:
  - type: web
    name: ksk-nct
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

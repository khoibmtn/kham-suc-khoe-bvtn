# Render.com Blueprint — "New +" -> "Blueprint" -> chọn repo này là xong.
# Push lên GitHub = tự deploy (giống Vercel).
services:
  - type: web
    name: ksk-nct
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

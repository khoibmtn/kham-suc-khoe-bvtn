# Chạy TRÊN MÁY CÁ NHÂN (Mac) để: (1) seed DB lên B2 lần đầu,
# (2) hoặc vừa dùng app local vừa sao lưu liên tục.
# Cần file .env.s3 ở gốc dự án (đã gitignore) chứa 4 biến S3_*.
dbs:
  - path: app/data/ksk.db
    replicas:
      - type: s3
        bucket: ${S3_BUCKET}
        path: ksk
        endpoint: ${S3_ENDPOINT}
        access-key-id: ${S3_ACCESS_KEY_ID}
        secret-access-key: ${S3_SECRET_ACCESS_KEY}
        force-path-style: true

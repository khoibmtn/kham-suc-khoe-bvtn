# Cấu hình Litestream trên server (Render/HF Spaces).
# 4 biến môi trường R2_* đặt trong dashboard của host — KHÔNG commit giá trị thật.
dbs:
  - path: /srv/app/data/ksk.db
    replicas:
      - type: s3
        bucket: ${R2_BUCKET}
        path: ksk
        endpoint: ${R2_ENDPOINT}
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        force-path-style: true
        sync-interval: 10s

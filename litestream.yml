# Cấu hình Litestream trên server (Render / HF Spaces).
# Kho lưu: Backblaze B2 (chuẩn S3). 4 biến S3_* đặt trong dashboard của host
# — KHÔNG commit giá trị thật. endpoint B2 dạng:
#   https://s3.<region>.backblazeb2.com   (vd s3.us-west-004.backblazeb2.com)
dbs:
  - path: /srv/app/data/ksk.db
    replicas:
      - type: s3
        bucket: ${S3_BUCKET}
        path: ksk-v2
        endpoint: ${S3_ENDPOINT}
        access-key-id: ${S3_ACCESS_KEY_ID}
        secret-access-key: ${S3_SECRET_ACCESS_KEY}
        force-path-style: true
        sync-interval: 10s
